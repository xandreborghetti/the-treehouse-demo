<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>The Treehouse</title>
  <style>
/* styles.css — The Treehouse. Warm "zine" palette, mobile-first, light/dark.
   Adapted from the-treehouse-preview.html. Self-contained, no external assets. */

:root {
  --paper:#F7F2E9; --ink:#26211C; --muted:#7A7066; --line:#E4DACB;
  --card:#FFFDF8; --coral:#E1614B; --teal:#2E6E68; --gold:#D79A34;
  /* Typewriter aesthetic: American Typewriter ships with macOS (warm, typewriter-like);
     Courier New is the cross-platform fallback. Used for the wordmark, headings, body & buttons. */
  --type:"American Typewriter","Courier New",Courier,ui-monospace,monospace;
  --serif:var(--type);
  --sans:var(--type);
  /* Plain system monospace reserved for tiny meta labels / timestamps for legibility. */
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
}
@media (prefers-color-scheme:dark){:root{
  --paper:#191614; --ink:#EDE6DA; --muted:#9A8F82; --line:#332C25;
  --card:#221E1A; --coral:#E9765F; --teal:#4F9B92; --gold:#E0AC52;}}
:root[data-theme="dark"]{--paper:#191614;--ink:#EDE6DA;--muted:#9A8F82;--line:#332C25;--card:#221E1A;--coral:#E9765F;--teal:#4F9B92;--gold:#E0AC52;}
:root[data-theme="light"]{--paper:#F7F2E9;--ink:#26211C;--muted:#7A7066;--line:#E4DACB;--card:#FFFDF8;--coral:#E1614B;--teal:#2E6E68;--gold:#D79A34;}

*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;letter-spacing:.01em;-webkit-font-smoothing:antialiased;}
.wrap{max-width:34rem;margin:0 auto;padding:0 1rem 4rem;}
button{font-family:inherit;}

/* --- avatar colors by member --- */
.av.coral,.dot-coral{background:var(--coral)}
.av.teal{background:var(--teal)}
.av.gold{background:var(--gold)}

/* --- header --- */
header{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:.75rem 0 .5rem;margin-bottom:1rem;}
.hd{max-width:34rem;margin:0 auto;padding:0 1rem;display:flex;align-items:center;gap:.5rem;}
.mark{font-family:var(--serif);font-size:1.5rem;font-weight:700;letter-spacing:-.01em;}
.mark .dot{color:var(--coral);}
.who{display:flex;gap:.3rem;align-items:center;margin-left:auto;}
.av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:.72rem;font-weight:700;color:#fff;font-family:var(--mono);}
.theme-toggle{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:999px;
  width:30px;height:30px;font-size:.95rem;cursor:pointer;display:grid;place-items:center;}
.theme-toggle:hover{color:var(--ink);border-color:var(--muted);}

/* --- nav --- */
.nav{max-width:34rem;margin:.55rem auto 0;padding:0 1rem;display:flex;gap:.4rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex:none;background:transparent;border:1px solid var(--line);border-radius:999px;color:var(--muted);
  font-size:.78rem;padding:.3rem .7rem;cursor:pointer;white-space:nowrap;}
.nav-btn:hover{color:var(--ink);}
.nav-btn.is-active{background:color-mix(in srgb,var(--coral) 15%,transparent);border-color:var(--coral);color:var(--ink);}

.demo{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);text-align:center;margin:.4rem 0 0;}

/* --- cards --- */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem 1.05rem;margin:.85rem 0;}
.eyebrow{font-family:var(--mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.pill{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;padding:.15em .5em;border-radius:999px;border:1px solid var(--line);color:var(--muted);}

/* --- section header --- */
.sec{font-family:var(--serif);font-size:1.3rem;font-weight:700;margin:.4rem 0 .2rem;display:flex;align-items:center;gap:.5rem;}
.sec-lead{color:var(--muted);font-size:.9rem;margin:.1rem 0 .4rem;}

/* --- poem --- */
.poem{background:linear-gradient(160deg,color-mix(in srgb,var(--gold) 14%,var(--card)),var(--card));border-color:color-mix(in srgb,var(--gold) 35%,var(--line));}
.poem .verse{font-family:var(--serif);font-size:1.32rem;line-height:1.4;margin:.5rem 0 .35rem;text-wrap:balance;}
.poem .attr{font-family:var(--serif);font-style:italic;color:var(--muted);}

/* ==========================================================================
   Wall — group chat
   The feed reads like an iMessage/WhatsApp thread: "You" (member id `you`) on the
   right in an accent bubble, everyone else on the left in a neutral bubble with a
   small avatar. Poem-of-the-week stays a pinned banner card above the chat.
   ========================================================================== */

/* feed = vertical chat log */
#feed.chat{display:flex;flex-direction:column;gap:.1rem;padding:.35rem 0 .4rem;}

/* one message row */
.msg{display:flex;gap:.45rem;align-items:flex-end;margin:.3rem 0;max-width:100%;}
.msg.theirs{justify-content:flex-start;}
.msg.mine{justify-content:flex-end;}
.msg > .av{flex:none;margin-bottom:.15rem;}
.msg-col{display:flex;flex-direction:column;max-width:82%;min-width:0;}
.msg.mine .msg-col{align-items:flex-end;}
.msg-name{font-size:.72rem;font-weight:600;color:var(--muted);margin:0 0 .12rem .25rem;}

/* the bubble */
.bubble{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:.5rem .72rem;
  font-size:.98rem;line-height:1.45;overflow-wrap:anywhere;}
.msg.theirs .bubble{border-bottom-left-radius:5px;}
.msg.mine .bubble{background:var(--coral);border-color:var(--coral);color:#fff;border-bottom-right-radius:5px;}
.msg.mine .bubble a{color:#fff;text-decoration:underline;}
.bubble .body{font-size:inherit;}
.msg-meta{font-family:var(--mono);font-size:.6rem;color:var(--muted);margin:.12rem .3rem 0;}
.msg-meta .time{white-space:nowrap;}

/* media, sized to sit inside a bubble */
.bubble .quote{font-family:var(--serif);font-size:1.05rem;line-height:1.45;border-left:3px solid var(--teal);padding-left:.7rem;margin:.1rem 0;color:inherit;}
.msg.mine .bubble .quote{border-left-color:rgba(255,255,255,.6);}
.songrow{display:flex;gap:.6rem;align-items:center;background:color-mix(in srgb,var(--teal) 10%,var(--card));border:1px solid var(--line);border-radius:12px;padding:.45rem .6rem;margin-top:.4rem;}
.msg.mine .songrow{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28);}
.songrow .ic{font-size:1.1rem;}
.songrow .s{color:var(--muted);font-family:var(--mono);font-size:.66rem;}
.msg.mine .songrow .s{color:rgba(255,255,255,.85);}
.songrow a{color:var(--teal);text-decoration:none;font-weight:600;font-size:.88rem;}
.msg.mine .songrow a{color:#fff;text-decoration:underline;}
.imgph{height:120px;border-radius:12px;margin-top:.4rem;background:
  repeating-linear-gradient(45deg,color-mix(in srgb,var(--coral) 16%,var(--card)),color-mix(in srgb,var(--coral) 16%,var(--card)) 12px,var(--card) 12px,var(--card) 24px);
  display:grid;place-items:center;color:var(--muted);font-family:var(--mono);font-size:.7rem;border:1px solid var(--line);}

/* reactions — small inline pills under the bubble */
.react{display:flex;gap:.4rem;margin-top:.7rem;align-items:center;flex-wrap:wrap;}
.msg .react{margin-top:.28rem;gap:.3rem;}
.msg.mine .react{justify-content:flex-end;}
.chip{font-size:.8rem;border:1px solid var(--line);border-radius:999px;padding:.15rem .55rem;background:transparent;color:var(--ink);cursor:pointer;}
.msg .chip{font-size:.74rem;padding:.08rem .45rem;line-height:1.5;}
.chip.on{background:color-mix(in srgb,var(--coral) 16%,transparent);border-color:var(--coral);}
.chip:hover{border-color:var(--muted);}

/* replies — tight, slightly-indented lines under the bubble */
.cmts{display:flex;flex-direction:column;gap:.1rem;margin:.3rem 0 0;}
.msg.mine .cmts{align-items:flex-end;}
.cmt-line{font-size:.82rem;color:var(--muted);padding-left:.55rem;border-left:2px solid var(--line);}
.msg.mine .cmt-line{padding-left:0;padding-right:.55rem;border-left:0;border-right:2px solid var(--line);text-align:right;}
.cmt-line b{color:var(--ink);font-weight:600;}
.cmt-form{display:flex;gap:.4rem;margin-top:.35rem;}
.cmt-form input{flex:1;font-family:inherit;font-size:.82rem;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:.3rem .65rem;}
.cmt-form button{flex:none;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:999px;padding:.3rem .65rem;font-size:.78rem;cursor:pointer;}

/* general form fields (predictions/goals/etc — unchanged behavior) */
.field input,.field select,.field textarea{
  width:100%;font-family:inherit;font-size:.95rem;color:var(--ink);background:var(--paper);
  border:1px solid var(--line);border-radius:10px;padding:.55rem .65rem;resize:vertical;}

/* composer — chat-style input bar pinned to the bottom of the Wall */
.chatbar{position:sticky;bottom:0;z-index:4;display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;
  background:color-mix(in srgb,var(--paper) 90%,transparent);backdrop-filter:blur(8px);
  border:1px solid var(--line);border-radius:22px;padding:.4rem .5rem;margin:.5rem 0 0;}
.chatbar-type{flex:none;width:auto;background:var(--paper);border:1px solid var(--line);border-radius:999px;
  padding:.35rem .45rem;font-family:inherit;font-size:.8rem;color:var(--ink);cursor:pointer;}
.chatbar-input{flex:1;min-width:8rem;font-family:inherit;font-size:.95rem;color:var(--ink);
  background:transparent;border:none;outline:none;padding:.4rem .3rem;}
.chatbar-url{flex-basis:100%;font-family:inherit;font-size:.82rem;color:var(--ink);background:var(--paper);
  border:1px solid var(--line);border-radius:999px;padding:.32rem .7rem;}
.chatbar-send{flex:none;width:34px;height:34px;border-radius:50%;background:var(--coral);border:none;
  color:#fff;font-size:1rem;cursor:pointer;display:grid;place-items:center;line-height:1;}
.chatbar-send:hover{filter:brightness(1.05);}

/* --- rows / mini cards --- */
.row{display:flex;justify-content:space-between;gap:.5rem;font-size:.86rem;padding:.28rem 0;border-bottom:1px dashed var(--line);align-items:center;}
.row:last-child{border-bottom:0;}
.row .s{color:var(--muted);font-family:var(--mono);font-size:.72rem;white-space:nowrap;}
.bars b{display:inline-block;height:6px;border-radius:3px;background:var(--teal);vertical-align:middle;}
.lead{color:var(--muted);font-size:.9rem;margin:.2rem 0 0;}
.mini h4{margin:.1rem 0 .5rem;font-size:.95rem;}

/* --- buttons / forms --- */
.btn{border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:999px;padding:.35rem .8rem;font-size:.82rem;cursor:pointer;}
.btn:hover{border-color:var(--muted);}
.btn-primary{background:var(--coral);border-color:var(--coral);color:#fff;}
.btn-primary:hover{filter:brightness(1.05);}
.field{display:flex;flex-direction:column;gap:.3rem;margin:.5rem 0;}
.field label{font-family:var(--mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}

/* --- meeting detail --- */
.meeting h3{font-family:var(--serif);font-size:1.25rem;margin:.2rem 0 .1rem;}
.meeting .hl{display:grid;gap:.35rem;margin:.4rem 0;}
.meeting .hl .who-hl{font-weight:600;}
.tag-list{display:flex;flex-wrap:wrap;gap:.35rem;margin:.4rem 0;}
.tag-list span{font-size:.78rem;border:1px solid var(--line);border-radius:999px;padding:.12rem .55rem;color:var(--muted);}
.keeper{font-family:var(--serif);font-size:1.12rem;line-height:1.45;border-left:3px solid var(--gold);padding-left:.8rem;margin:.6rem 0 0;}
.back-link{background:none;border:none;color:var(--teal);font-size:.82rem;cursor:pointer;padding:0;margin-bottom:.4rem;}

footer{text-align:center;color:var(--muted);font-family:var(--mono);font-size:.68rem;margin:2.5rem auto 0;max-width:34rem;padding:1.2rem 1rem 0;border-top:1px solid var(--line);}

</style>
</head>
<body>
  <header>
    <div class="hd">
      <div class="mark">The Tree<span class="dot">·</span>house</div>
      <div class="who" id="who"><!-- avatars injected by app.js --></div>
      <button id="themeToggle" class="theme-toggle" title="Toggle light/dark" aria-label="Toggle theme">◐</button>

    <nav class="nav" id="nav" aria-label="Sections">

      <button class="nav-btn" data-section="shelf">🎵 Shelf</button>

  <main class="wrap" id="app">
    <p class="demo">DEMO · sample content · nothing you do here is saved</p>
    <div id="view"><!-- sections rendered here by app.js --></div>
  </main>

  <footer>THE TREEHOUSE · a private clubhouse for three</footer>

const db = (() => {

/* ---- data layer (the Supabase seam) ---- */
const data = (() => {
// data.js — THE SEAM.

async function getPosts() {
  return clone(db.posts).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

// SUPABASE: replace with supabase.from('posts').insert(post).select().single()
async function addPost({ type = 'thought', author, body, url = null, title = null, note = null, image_path = null }) {
  const post = {
    id: uid('p'),
    type,
    author,
    body,
    url,
    title,
    note,
    image_path,
    created_at: nowISO(),
    pinned: false,
    reactions: [],
    comments: [],
  };
  db.posts.unshift(post);
  return clone(post);
}

// SUPABASE: replace with supabase.from('reactions').insert({ post_id, member, emoji })
// (with a unique (post_id, member, emoji) constraint so a repeat toggles/removes)
async function addReaction({ post_id, member, emoji }) {
  const post = db.posts.find((p) => p.id === post_id);
  if (!post) return null;
  const existing = post.reactions.findIndex((r) => r.member === member && r.emoji === emoji);
  if (existing >= 0) post.reactions.splice(existing, 1); // toggle off
  else post.reactions.push({ member, emoji });
  return clone(post);
}

// SUPABASE: replace with supabase.from('comments').insert({ post_id, member, text })
async function addComment({ post_id, member, text }) {
  const post = db.posts.find((p) => p.id === post_id);
  if (!post) return null;
  post.comments.push({ member, text, created_at: nowISO() });
  return clone(post);
}

// SUPABASE: replace with supabase.from('prediction_votes').upsert({ prediction_id, member, vote, points })
async function votePrediction({ prediction_id, member, vote, points = 50 }) {
  const p = db.predictions.find((x) => x.id === prediction_id);
  if (!p) return null;
  const existing = p.votes.find((v) => v.member === member);
  if (existing) {

    existing.points = points;
  } else {

// Utility (local only — Supabase would compute week server-side if needed)
// ---------------------------------------------------------------------------
function currentWeek() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
}

(() => {
// app.js — The Treehouse UI. Renders each section from the data layer and wires
// interactions that write THROUGH data.js (never the store directly). Every
// mutation re-renders so the app feels live locally.


// In a real app the signed-in member comes from Supabase auth. Locally we act
// as "You".
const ME = 'you';

const view = document.getElementById('view');
const whoEl = document.getElementById('who');
const nav = document.getElementById('nav');

let members = [];
let membersById = {};
let currentSection = 'wall';
let openMeetingId = null;

// --- helpers ---------------------------------------------------------------
const esc = (s) =>
  String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

const nameOf = (id) => membersById[id]?.name ?? id;
const colorOf = (id) => membersById[id]?.color ?? 'coral';
const initialOf = (id) => membersById[id]?.initial ?? '?';

function avatar(memberId) {
  return `<span class="av ${colorOf(memberId)}">${esc(initialOf(memberId))}</span>`;
}

function timeAgo(iso) {
  const then = new Date(iso).getTime();
  const mins = Math.round((Date.now() - then) / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return `${mins}m`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  const days = Math.round(hrs / 24);
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days}d`;
  return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

// Group reactions by emoji -> [members]
function reactionSummary(reactions) {
  const map = new Map();
  for (const r of reactions) {
    if (!map.has(r.emoji)) map.set(r.emoji, []);
    map.get(r.emoji).push(r.member);
  }
  return map;
}

// Chat-style input bar, pinned to the bottom of the Wall view.
function composeBar() {
  return `
    <form class="chatbar" id="composeForm">
      <select id="composeType" class="chatbar-type" aria-label="Post type">
        <option value="thought">💭 thought</option>
        <option value="quote">❝ quote</option>
        <option value="song">🎧 song</option>
        <option value="link">🔗 link</option>
        <option value="poem">📖 poem</option>

      <input id="composeUrl" class="chatbar-url" placeholder="add a link (optional)…" aria-label="Link" />
    </form>`;
}

function postCard(p) {
  const mine = p.author === ME;
  const reacts = reactionSummary(p.reactions);
  const wallEmojis = ['❤️', '🔥', '🥹', '😍'];
  const known = new Set(wallEmojis);
  for (const e of reacts.keys()) known.add(e);

  const chips = [...known]
    .map((emoji) => {
      const who = reacts.get(emoji) || [];
      const on = who.includes(ME) ? 'on' : '';
      const count = who.length ? ` ${who.length}` : '';
      return `<button class="chip ${on}" data-react="${esc(emoji)}">${emoji}${count}</button>`;
    })
    .join('');

  let media = '';
  if (p.type === 'quote') {
    media = `<div class="quote">${esc(p.body)}</div>${p.note ? `<div class="lead" style="margin-top:.4rem">${esc(p.note)}</div>` : ''}`;
  } else if (p.type === 'song') {
    media = `<div class="body">${esc(p.body)}</div>
      <div class="songrow"><span class="ic">🎧</span><div>
        ${p.url ? `<a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title || 'listen')}</a>` : `<div style="font-weight:600;font-size:.9rem">${esc(p.title || '')}</div>`}
        ${p.note ? `<div class="s">${esc(p.note)}</div>` : ''}
      </div></div>`;
  } else if (p.type === 'image') {
    media = `<div class="body">${esc(p.body)}</div><div class="imgph">${esc(p.image_path || '[ shared photo ]')}</div>`;
  } else if (p.type === 'link' && p.url) {
    media = `<div class="body">${esc(p.body)}</div><div class="songrow"><span class="ic">🔗</span><div><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.url)}</a></div></div>`;
  } else {
    media = `<div class="body">${esc(p.body)}</div>`;
  }

  const comments = p.comments.length
    ? `<div class="cmts">${p.comments
        .map((c) => `<div class="cmt-line"><b>${esc(nameOf(c.member))}</b> ${esc(c.text)}</div>`)
        .join('')}</div>`
    : '';

  return `
    <div class="msg ${mine ? 'mine' : 'theirs'}" data-post="${esc(p.id)}">
      ${mine ? '' : avatar(p.author)}
      <div class="msg-col">
        ${mine ? '' : `<div class="msg-name">${esc(nameOf(p.author))}</div>`}
        <div class="bubble">${media}</div>
        <div class="msg-meta"><span class="time">${timeAgo(p.created_at)}</span></div>
        <div class="react">${chips}<button class="chip" data-toggle-comment>💬</button></div>
        ${comments}
        <form class="cmt-form" data-comment-form hidden>
          <input placeholder="reply…" aria-label="Comment" />
          <button type="submit">Send</button>
        </form>
      </div>
    </div>`;
}

function wireCompose() {
  const form = document.getElementById('composeForm');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = document.getElementById('composeBody').value.trim();
    const type = document.getElementById('composeType').value;
    const url = document.getElementById('composeUrl').value.trim() || null;
    if (!body && !url) return;
    await data.addPost({ type, author: ME, body: body || '', url, title: type === 'song' ? body : null });
    renderWall();
  });
}

function wireFeed() {
  const feed = document.getElementById('feed');
  feed.addEventListener('click', async (e) => {
    const postEl = e.target.closest('[data-post]');
    if (!postEl) return;
    const postId = postEl.dataset.post;

    const reactBtn = e.target.closest('[data-react]');
    if (reactBtn) {
      await data.addReaction({ post_id: postId, member: ME, emoji: reactBtn.dataset.react });
      renderWall();
      return;
    }
    if (e.target.closest('[data-toggle-comment]')) {
      const f = postEl.querySelector('[data-comment-form]');
      f.hidden = !f.hidden;
      if (!f.hidden) f.querySelector('input').focus();
    }
  });
  feed.addEventListener('submit', async (e) => {
    const form = e.target.closest('[data-comment-form]');
    if (!form) return;
    e.preventDefault();
    const postId = e.target.closest('[data-post]').dataset.post;
    const input = form.querySelector('input');
    const text = input.value.trim();
    if (!text) return;
    await data.addComment({ post_id: postId, member: ME, text });
    renderWall();
  });
}

          (g) => `
        <div class="row" data-goal="${esc(g.id)}">
          <span>${avatar(g.member)} ${esc(nameOf(g.member))} — ${esc(g.goal)}</span>
          <span style="display:flex;align-items:center;gap:.5rem">
            <span class="bars"><b style="width:${Math.round(g.progress * 0.8)}px;background:${barColor[g.member] || 'var(--teal)'}"></b></span>
            <button class="chip" data-checkin>✓ check in</button>
          </span>
        </div>`
        )
        .join('')}
    </div>

    <div class="card">
      <div class="eyebrow">➕ Add a goal</div>
      <form id="goalForm">
        <div class="field"><label>Whose</label>
          <select id="goalMember">${members.map((m) => `<option value="${m.id}">${esc(m.name)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Goal</label><input id="goalText" placeholder="e.g. read 20 min a day" /></div>
        <button class="btn btn-primary" type="submit">Add goal</button>
      </form>
    </div>
  `;

  view.querySelector('.card').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-checkin]');
    if (!btn) return;
    const row = e.target.closest('[data-goal]');
    await data.checkinGoal({ goal_id: row.dataset.goal });
    renderGoals();
  });

  document.getElementById('goalForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const goal = document.getElementById('goalText').value.trim();
    if (!goal) return;
    await data.addGoal({ member: document.getElementById('goalMember').value, goal });
    renderGoals();
  });
}

// ===========================================================================
// Bucket list
// ===========================================================================
async function renderBucket() {
  const items = await data.getBucketList();
  const statusLabel = { someday: 'someday', 'in-progress': 'in progress', done: 'done' };

  view.innerHTML = `
    <div class="sec">🪣 Bucket list</div>
    <p class="sec-lead">Things we say we'll do. A running record of the ones we actually did.</p>
    <div class="card">
      ${items
        .map(
          (b) => `
        <div class="row" data-bucket="${esc(b.id)}">
          <span>${b.status === 'done' ? '✓ ' : ''}${esc(b.item)} <span class="s">· ${esc(nameOf(b.added_by))}</span></span>
          <span style="display:flex;align-items:center;gap:.5rem">
            <span class="s">${esc(b.done_note || statusLabel[b.status] || b.status)}</span>
            ${b.status !== 'done' ? '<button class="chip" data-done>mark done</button>' : ''}
          </span>
        </div>`
        )
        .join('')}
    </div>

    <div class="card">
      <div class="eyebrow">➕ Add to the list</div>
      <form id="bucketForm">
        <div class="field"><label>Someday we…</label><input id="bucketText" placeholder="e.g. see the northern lights" /></div>
        <button class="btn btn-primary" type="submit">Add</button>
      </form>
    </div>
  `;

  view.querySelector('.card').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-done]');
    if (!btn) return;
    const row = e.target.closest('[data-bucket]');
    await data.markBucketDone({ id: row.dataset.bucket, done_by: ME, done_note: 'done · just now' });
    renderBucket();
  });

  document.getElementById('bucketForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const item = document.getElementById('bucketText').value.trim();
    if (!item) return;
    await data.addBucketItem({ item, added_by: ME });
    renderBucket();
  });
}

// ===========================================================================
// Shelf (media links)
// ===========================================================================
async function renderShelf() {
  const links = await data.getMediaLinks();
  const icon = { song: '🎵', playlist: '🎵', movie: '🎬', book: '📖', article: '📰' };

  view.innerHTML = `
    <div class="sec">🎵 Shared shelf</div>
    <p class="sec-lead">Songs, films, books, articles. Titles + links only — never full text.</p>
    <div class="card">
      <div class="eyebrow">this week's drops</div>
      ${links
        .map(
          (l) => `<div class="row">
            <span>${icon[l.type] || '🔗'} ${l.url ? `<a href="${esc(l.url)}" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:none">${esc(l.title)}</a>` : `<em>${esc(l.title)}</em>`} <span class="s">(${esc(l.type)})</span></span>
            <span class="s">${esc(l.note || nameOf(l.added_by) + ' rec')}</span>
          </div>`
        )
        .join('')}
    </div>

    <div class="card">
      <div class="eyebrow">➕ Add a drop</div>
      <form id="shelfForm">
        <div class="field"><label>Type</label>
          <select id="shelfType">
            <option value="song">🎵 song</option>
            <option value="playlist">🎵 playlist</option>
            <option value="movie">🎬 movie</option>
            <option value="book">📖 book</option>
            <option value="article">📰 article</option>
          </select>
        </div>
        <div class="field"><label>Title</label><input id="shelfTitle" placeholder="title" /></div>
        <div class="field"><label>Link (optional)</label><input id="shelfUrl" placeholder="https://…" /></div>
        <div class="field"><label>One-line note</label><input id="shelfNote" placeholder="why it's good" /></div>
        <button class="btn btn-primary" type="submit">Add to shelf</button>
      </form>
    </div>
  `;

  document.getElementById('shelfForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('shelfTitle').value.trim();
    if (!title) return;
    await data.addMediaLink({
      type: document.getElementById('shelfType').value,
      title,
      url: document.getElementById('shelfUrl').value.trim() || null,
      note: document.getElementById('shelfNote').value.trim() || null,
      added_by: ME,
    });
    renderShelf();
  });
}

// ===========================================================================
// Theme toggle (overrides prefers-color-scheme via data-theme on <html>)
// ===========================================================================
function setupTheme() {
  const btn = document.getElementById('themeToggle');
  btn.addEventListener('click', () => {
    const root = document.documentElement;
    const current =
      root.getAttribute('data-theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  });
}

boot();
})();

</script>
